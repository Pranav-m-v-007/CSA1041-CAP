name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Get code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t pranavmv007/app:latest .

    - name: Login to Docker Hub
      run: echo "${{ secrets.Mvpranav007. }}" | docker login -u "${{ secrets.pranavmv007 }}" --password-stdin

    - name: Push Image
      run: docker push pranavmv007/app:latest
