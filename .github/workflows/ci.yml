name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t your-dockerhub-username/app:latest .

    - name: Login to Docker Hub
      run: echo "${{ secrets.Mvpranav007. }}" | docker login -u "${{ secrets.pranavmv007 }}" --password-stdin

    - name: Push Docker Image
      run: docker push your-dockerhub-username/app:latest
